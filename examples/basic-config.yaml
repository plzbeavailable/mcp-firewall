# MCP Firewall Configuration
# Generated by: mcp-firewall init
# Docs: https://github.com/mcp-firewall/mcp-firewall

version: "1"

# Proxy mode: 'stdio' (for Claude Desktop) or 'http' (for team server)
mode: stdio

# Upstream MCP servers to proxy to
upstreams:
  - name: example
    transport: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/tmp"

# ─── Security Policies ────────────────────────────────────────
policies:
  # Block any MCP method not in this list
  method_allowlist:
    enabled: true
    allowed_methods:
      - initialize
      - ping
      - tools/list
      - tools/call
      - resources/list
      - resources/read
      - prompts/list
      - prompts/get
    block_unknown: true

  # Role-Based Access Control (disabled by default)
  rbac:
    enabled: false
    rules: []
    # Example rule:
    # - name: "allow-read-only"
    #   principals:
    #     - type: client-id
    #       pattern: "claude-desktop"
    #   targets:
    #     - method: "tools/call"
    #       toolName: "read_*"
    #   permission: allow

  # Rate Limiting (disabled by default)
  rate_limiting:
    enabled: false
    rules: []
    # Example rule:
    # - name: "per-client-global"
    #   window: "1m"
    #   maxRequests: 100
    #   keyBy: ["client-id"]

  # Parameter Validation
  parameter_validation:
    enabled: true
    strict_mode: false
    max_string_length: 1048576

  # Content Filtering (disabled by default)
  content_filter:
    enabled: false
    rules: []
    # Example rule:
    # - pattern: "rm -rf /"
    #   action: block
    #   phase: input

  # Sensitive Data Detection
  sensitive_data:
    enabled: true
    detectors:
      - type: credit-card
        action: mask
      - type: api-key
        action: mask
      - type: jwt
        action: mask

# ─── Observability ────────────────────────────────────────────
observability:
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"

  tracing:
    enabled: false

  audit_log:
    enabled: true
    output: stdout
    format: jsonl

  token_tracking:
    enabled: true
    estimation_mode: conservative

# ─── Database ──────────────────────────────────────────────────
database:
  type: sqlite
  sqlite:
    path: "./data/mcp-firewall.db"

# ─── Dashboard ─────────────────────────────────────────────────
dashboard:
  enabled: true
  host: "127.0.0.1"
  port: 9021
